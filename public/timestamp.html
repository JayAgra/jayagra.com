<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width,initial-scale=1,shrink-to-fit=no" name="viewport"/>
        <title>Timestamp Tools</title>
        <meta content="Browser tool to parse and create Unix timestamps and second/millisecond offsets." name="description"/>
        <link href="/apple-touch-icon.png?v=110-01" rel="apple-touch-icon" sizes="180x180"/>
        <link href="/favicon-32x32.png?v=110-01" rel="icon" sizes="32x32" type="image/png"/>
        <link href="/favicon-16x16.png?v=110-01" rel="icon" sizes="16x16" type="image/png"/>
        <link href="static/main.min.css?v=120-02" rel="stylesheet"/>
        <meta content="#1e1e1f" name="msapplication-TileColor"/>
        <meta content="#1e1e1f" name="theme-color"/>
    </head>
    <body>
        <div class="container endMargin">
            <div class="VStack">
                <h1 class="pageTitle">Timestamp Tools</h1>
                <div class="itemGrid timestampGrid endMargin">
                    <div class="ZStack">
                        <div class="itemTitleContainer">
                            <h3 class="toolTitle">Timestamp Parser</h3>
                        </div>
                        <div class="VStack innerTile">
                            <div class="VStack innerTileRow center timestampUpper">
                                <input type="tel" placeholder="Timestamp" id="timestampInput"/>
                            </div>
                            <div class="timestampLower">
                                <span class="bold">UTC/GMT</span>
                                <span id="timestampOutGmt"></span>
                                <span class="bold">Local</span>
                                <span id="timestampOutLocal"></span>
                                <span class="bold">Relative</span>
                                <span id="timestampOutRelative"></span>
                            </div>
                        </div>
                    </div>
                    <div class="ZStack">
                        <div class="itemTitleContainer">
                            <h3 class="toolTitle">Timestamp Maker</h3>
                        </div>
                        <div class="VStack innerTile">
                            <div class="VStack innerTileRow center timestampUpper">
                                <input type="datetime-local" id="dateTimeInput" value="2026-01-01T00:00"/>
                                <select id="timeZoneInput"><option value="-660">Pacific/Niue<option value="-660">Pacific/Pago_Pago<option value="-600">America/Adak (SDT)<option value="-540">America/Adak (DST)<option value="-600">Pacific/Honolulu<option value="-600">Pacific/Rarotonga<option value="-600">Pacific/Tahiti<option value="-570">Pacific/Marquesas<option value="-540">America/Anchorage (SDT)<option value="-480">America/Anchorage (DST)<option value="-480">Pacific/Gambier<option value="-480">America/Los_Angeles (SDT)<option value="-420">America/Los_Angeles (DST)<option value="-480">US/Pacific (SDT)<option value="-420">US/Pacific (DST)<option value="-420">America/Denver (SDT)<option value="-360">America/Denver (DST)<option value="-420">America/Phoenix<option value="-420">America/Vancouver<option value="-420">US/Mountain<option value="-360">America/Chicago (SDT)<option value="-300">America/Chicago (DST)<option value="-360">US/Central (SDT)<option value="-300">US/Central (DST)<option value="-300">America/New_York (SDT)<option value="-240">America/New_York (DST)<option value="-300">US/Eastern (SDT)<option value="-240">US/Eastern	(DST)<option value="-240">America/Puerto_Rico<option value="-240">Atlantic/Bermuda (SDT)<option value="-180">Atlantic/Bermuda (DST)<option value="-180">America/Argentina/Buenos_Aires<option value="-180">America/Sao_Paulo<option value="-120">America/Noronha<option value="-120">America/Nuuk (SDT)<option value="-60">America/Nuuk (DST)<option value="-60">Atlantic/Azores (SDT)<option value="0">Atlantic/Azores (DST)<option value="0">Africa/Abidjan<option value="0"selected>GMT<option value="0">UTC<option value="0">Zulu<option value="0">Europe/Dublin (SDT)<option value="60">Europe/Dublin (DST)<option value="0">Europe/Lisbon (SDT)<option value="60">Europe/Lisbon (DST)<option value="0">Europe/London (SDT)<option value="60">Europe/London (DST)<option value="60">Africa/Algiers<option value="60">Africa/Lagos<option value="60">Europe/Berlin (SDT)<option value="120">Europe/Berlin (DST)<option value="60">Europe/Rome (SDT)<option value="120">Europe/Rome (DST)<option value="120">Africa/Cairo (SDT)<option value="180">Africa/Cairo (DST)<option value="120">Africa/Johannesburg<option value="120">Asia/Jerusalem (SDT)<option value="180">Asia/Jerusalem (DST)<option value="120">Europe/Athens (SDT)<option value="180">Europe/Athens (DST)<option value="180">Africa/Nairobi<option value="180">Asia/Baghdad<option value="180">Asia/Qatar<option value="180">Asia/Riyadh<option value="180">Europe/Istanbul<option value="210">Asia/Tehran<option value="240">Asia/Dubai<option value="240">Indian/Mauritius<option value="270">Asia/Kabul<option value="300">Antarctica/Mawson<option value="300">Antarctica/Vostok<option value="300">Asia/Almaty<option value="300">Asia/Ashgabat<option value="300">Asia/Karachi<option value="300">Indian/Maldives<option value="330">Asia/Kolkata<option value="345">Asia/Kathmandu<option value="360">Asia/Dhaka<option value="390">Asia/Yangon<option value="420">Antarctica/Davis<option value="420">Asia/Bangkok<option value="420">Asia/Ho_Chi_Minh<option value="420">Asia/Jakarta<option value="480">Asia/Hong_Kong<option value="480">Asia/Macau<option value="480">Asia/Singapore<option value="480">Asia/Taipei<option value="480">Australia/Perth<option value="525">Australia/Eucla<option value="540">Asia/Seoul<option value="540">Asia/Tokyo<option value="540">Pacific/Palau<option value="570">Australia/Adelaide<option value="600">Antarctica/Macquarie (SDT)<option value="660">Antarctica/Macquarie (DST)<option value="600">Australia/Brisbane (SDT)<option value="660">Australia/Brisbane (DST)<option value="600">Australia/Sydney (SDT)<option value="660">Australia/Sydney (DST)<option value="600">Pacific/Chuuk<option value="600">Pacific/Guam<option value="660">Pacific/Kosrae<option value="660">Pacific/Pohnpei<option value="720">Antarctica/South_Pole (SDT)<option value="780">Antarctica/South_Pole (DST)<option value="720">Pacific/Auckland (SDT)<option value="780">Pacific/Auckland (DST)<option value="720">Pacific/Fiji<option value="720">Pacific/Kwajalein<option value="720">Pacific/Majuro<option value="720">Pacific/Wake<option value="840">Pacific/Kiritimati</select>
                            </div>
                            <div class="timestampLower">
                                <span id="timestampOutStamp" class="r2"></span>
                                <span class="bold r2">(ms)</span>
                                <span id="timestampOutOtherStamp" class="r3"></span>
                                <span class="bold r3">(s)</span>
                            </div>
                        </div>
                    </div>
                    <div class="ZStack">
                        <div class="itemTitleContainer">
                            <h3 class="toolTitle">Offset Parser</h3>
                        </div>
                        <div class="VStack innerTile">
                            <div class="HStack innerTileRow center timestampUpper">
                                <div class="fullHeight VStack textLeft">
                                    <label for="offsetInput">Offset</label>
                                    <label for="offsetInUnit">Unit</label>
                                </div>
                                <div class="fullHeight VStack">
                                    <input type="tel" offsetInput="Offset" id="offsetInput"/>
                                    <select name="offsetInUnit" id="offsetInUnit"><option value="s" selected>Unit: Seconds</option><option value="ms">Unit: Milliseconds</option></select>
                                </div>
                            </div>
                            <div class="VStack timestampMargin">
                                <span id="offsetOutString">3</span>
                            </div>
                        </div>
                    </div>
                    <div class="ZStack">
                        <div class="itemTitleContainer">
                            <h3 class="toolTitle">Offset Maker</h3>
                        </div>
                        <div class="VStack innerTile">
                            <div class="HStack innerTileRow center timestampUpper">
                                <div class="VStack textLeft fullHeight">
                                    <label for="yearsInput">Years</label>
                                    <label for="daysInput">Days</label>
                                    <label for="hoursInput">Hours</label>
                                    <label for="minutesInput">Minutes</label>
                                    <label for="secondsInput">Seconds</label>
                                </div>
                                <div class="VStack fullHeight">
                                    <input type="tel" name="yearsInput" id="yearsInput"/>
                                    <input type="tel" name="daysInput" id="daysInput"/>
                                    <input type="tel" name="hoursInput" id="hoursInput"/>
                                    <input type="tel" name="minutesInput" id="minutesInput"/>
                                    <input type="tel" name="secondsInput" id="secondsInput"/>
                                </div>
                            </div>
                            <div class="timestampLower">
                                <span id="offsetOutStamp" class="r2"></span>
                                <span class="bold r2">(ms)</span>
                                <span id="offsetOutOtherStamp" class="r3"></span>
                                <span class="bold r3">(s)</span>
                            </div>
                        </div>
                    </div>
                </div>
                <small>See the <a href="https://github.com/JayAgra/jayagra.com" target="_blank">code [↗]</a>.</small>

            </div>
        </div>
        <script src="static/timestamp.min.js"></script>
    </body>
</html>
